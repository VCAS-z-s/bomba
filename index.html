<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#201216">
  <meta name="description" content="Offline PWA pro dětskou táborovou hru s časovanou bombou.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Bomba</title>
</head>
<body>
  <main class="app-shell">
    <section class="hero-card" aria-labelledby="app-title">
      <div class="hero-top">
        <div class="bomb-mark" aria-hidden="true">
          <svg viewBox="0 0 128 128" role="presentation">
            <circle cx="64" cy="74" r="34"></circle>
            <path d="M75 37c4-8 11-14 20-18"></path>
            <path d="M90 16c8 1 15 7 17 15"></path>
            <path d="M98 29c5 0 10 2 14 6"></path>
            <circle cx="52" cy="63" r="5" class="spark"></circle>
          </svg>
        </div>
        <div>
          <h1 id="app-title">Bomba</h1>
          <p class="hero-copy">Na Androidu otevři menu prohlížeče a zvol <strong>Přidat na plochu</strong> nebo <strong>Instalovat aplikaci</strong>. Na iPhonu v Safari klepni na <strong>Sdílet</strong> a pak na <strong>Přidat na plochu</strong>.</p>
        </div>
      </div>

      <div class="status-card" aria-live="polite" aria-atomic="true">
        <p class="status-label">Stav hry</p>
        <p id="statusText" class="status-text">Připraveno</p>
        <p id="errorText" class="error-text" hidden></p>
      </div>

      <div id="bombStage" class="bomb-stage" data-state="ready" aria-hidden="true">
        <div class="pulse-ring"></div>
        <div class="pulse-core"></div>
        <div class="stage-glow"></div>
      </div>

      <p id="countdownText" class="countdown" hidden>Zbývá 0,0 s</p>

      <form id="settingsForm" class="panel" novalidate>
        <fieldset class="settings-grid">
          <legend>Nastavení kola</legend>

          <label class="field">
            <span>Minimum (s)</span>
            <input id="minSeconds" name="minSeconds" type="number" inputmode="decimal" min="0.1" max="3600" step="0.1" value="30" required>
          </label>

          <label class="field">
            <span>Maximum (s)</span>
            <input id="maxSeconds" name="maxSeconds" type="number" inputmode="decimal" min="0.1" max="3600" step="0.1" value="90" required>
          </label>
        </fieldset>

        <div class="toggles">
          <label class="toggle">
            <input id="showCountdown" name="showCountdown" type="checkbox">
            <span>Zobrazit zbývající čas</span>
          </label>

          <label class="toggle">
            <input id="allowManualExplosion" name="allowManualExplosion" type="checkbox">
            <span>Povolit tlačítko ručního výbuchu</span>
          </label>
        </div>
      </form>

      <section class="actions" aria-label="Ovládání hry">
        <button id="startButton" class="button button-start" type="button">START</button>
        <button id="manualExplosionButton" class="button button-explosion" type="button" hidden>VÝBUCH</button>
        <button id="stopButton" class="button button-stop" type="button" disabled>ZASTAVIT</button>
      </section>

      <section class="panel tests" aria-label="Test zvuků">
        <h2>Test zvuků</h2>
        <div class="test-actions">
          <button id="testTickButton" class="button button-secondary" type="button">Otestovat tikání</button>
          <button id="testExplosionButton" class="button button-secondary" type="button">Otestovat výbuch</button>
        </div>
      </section>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
